<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Vote – Are You Smarter Than an AI Chat Bot</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #08081a;
    color: #fff;
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px 20px;
    text-align: center;
    -webkit-tap-highlight-color: transparent;
  }

  .logo {
    font-size: 1.3rem;
    font-weight: 900;
    letter-spacing: 3px;
    text-transform: uppercase;
    background: linear-gradient(90deg, #a78bfa, #60a5fa, #34d399);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 6px;
  }
  .sub {
    font-size: 0.78rem;
    color: #333;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 28px;
  }

  .prompt {
    font-size: 1.05rem;
    font-weight: 600;
    color: #bbb;
    margin-bottom: 22px;
    line-height: 1.4;
  }

  /* Vote buttons */
  .vote-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 13px;
    width: 100%;
    max-width: 380px;
    margin-bottom: 22px;
  }

  .vbtn {
    padding: 26px 16px;
    border: none;
    border-radius: 18px;
    font-size: 1.05rem;
    font-weight: 800;
    cursor: pointer;
    letter-spacing: 0.5px;
    position: relative;
    overflow: hidden;
    transition: transform 0.15s, filter 0.15s, box-shadow 0.2s;
    /* color set inline */
  }
  .vbtn:hover:not(:disabled) {
    filter: brightness(1.12);
    transform: translateY(-3px);
    box-shadow: 0 8px 30px rgba(0,0,0,0.4);
  }
  .vbtn:active:not(:disabled) { transform: scale(0.94); }
  .vbtn:disabled {
    filter: brightness(0.35) saturate(0.2);
    cursor: not-allowed;
    transform: none !important;
  }
  /* Ripple */
  .vbtn::after {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(255,255,255,0.15);
    opacity: 0;
    transition: opacity 0.2s;
  }
  .vbtn:hover:not(:disabled)::after { opacity: 1; }

  /* Status messages */
  .status {
    min-height: 22px;
    font-size: 0.9rem;
    color: #555;
    margin-bottom: 10px;
    transition: color 0.3s;
  }
  .status.wait   { color: #555; }
  .status.active { color: #bbb; }
  .status.error  { color: #ff4757; }

  /* ── Thank-you screen ── */
  #thankYou {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 14px;
  }
  #thankYou.show { display: flex; }
  #voteMain.gone { display: none; }

  .big-icon {
    font-size: 5rem;
    animation: pop 0.45s cubic-bezier(0.36, 0.07, 0.19, 0.97) both;
  }
  @keyframes pop {
    0%   { transform: scale(0) rotate(-10deg); opacity: 0; }
    80%  { transform: scale(1.2) rotate(2deg); }
    100% { transform: scale(1) rotate(0); opacity: 1; }
  }

  .voted-for {
    font-size: 1.3rem;
    font-weight: 700;
  }
  .voted-name { font-weight: 900; font-size: 1.5rem; display: block; margin-top: 4px; }
  .vote-note { color: #444; font-size: 0.85rem; margin-top: 4px; }

  /* Closed overlay text */
  .closed-note {
    font-size: 0.85rem;
    color: #333;
    margin-top: 6px;
  }
</style>
</head>
<body>

<!-- Voting form -->
<div id="voteMain">
  <div class="logo">Are You Smarter Than an AI Chat Bot?</div>
  <div class="sub">Audience Vote</div>

  <div class="prompt" id="prompt">Who gave the best answer?</div>

  <div class="vote-grid" id="voteGrid"></div>

  <div class="status wait" id="statusMsg">Connecting…</div>
  <div class="closed-note" id="closedNote" style="display:none">Voting is not open yet — stand by.</div>
</div>

<!-- Thank you screen -->
<div id="thankYou">
  <div class="logo">Are You Smarter Than an AI Chat Bot?</div>
  <div class="big-icon" id="bigIcon">✅</div>
  <div class="voted-for">
    You voted for
    <span class="voted-name" id="votedName">—</span>
  </div>
  <div class="vote-note">Thanks for voting!</div>
</div>

<script>
// ── Voter identity (per browser, resets per round) ────────────────────────────
function genId() {
  return Math.random().toString(36).slice(2) + Date.now().toString(36);
}
function getVoterId() {
  let id = sessionStorage.getItem('gs_voter_id');
  if (!id) { id = genId(); sessionStorage.setItem('gs_voter_id', id); }
  return id;
}

const VOTER_ID = getVoterId();

// Track which round we've voted in (so "New Round" on host resets our vote)
let votedRound = Number(sessionStorage.getItem('gs_voted_round') || 0);

let ws   = null;
let state = null;
let submitting = false;

const voteMain  = document.getElementById('voteMain');
const thankYou  = document.getElementById('thankYou');
const voteGrid  = document.getElementById('voteGrid');
const statusMsg = document.getElementById('statusMsg');
const closedNote = document.getElementById('closedNote');

// ── WebSocket ─────────────────────────────────────────────────────────────────
function connect() {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(`${proto}//${location.host}`);

  ws.onopen = () => {
    statusMsg.className = 'status active';
    statusMsg.textContent = '';
  };
  ws.onclose = () => {
    statusMsg.className = 'status wait';
    statusMsg.textContent = 'Reconnecting…';
    setTimeout(connect, 2000);
  };
  ws.onmessage = e => {
    const msg = JSON.parse(e.data);
    if (msg.type === 'STATE')       renderVote(msg.data);
    if (msg.type === 'VOTE_RESULT') handleResult(msg);
  };
}

// ── Render vote page ──────────────────────────────────────────────────────────
function renderVote(s) {
  state = s;

  // If it's a new round, reset our "has voted" state
  if (s.voting.round > votedRound && votedRound !== 0) {
    votedRound = 0;
    sessionStorage.removeItem('gs_voted_round');
    voteMain.classList.remove('gone');
    thankYou.classList.remove('show');
  }

  // If we've already voted this round, show thank-you
  if (votedRound === s.voting.round) {
    voteMain.classList.add('gone');
    thankYou.classList.add('show');
    return;
  }

  const open = s.voting.open;

  // Rebuild buttons if player count changed, else update
  if (voteGrid.children.length !== s.players.length) {
    voteGrid.innerHTML = '';
    s.players.forEach((p, i) => voteGrid.appendChild(makeBtn(p, i, open)));
  } else {
    s.players.forEach((p, i) => {
      const btn = voteGrid.children[i];
      btn.textContent = p.name;
      btn.disabled = !open || submitting;
    });
  }

  if (open) {
    statusMsg.className = 'status active';
    statusMsg.textContent = 'Tap a player to cast your vote!';
    closedNote.style.display = 'none';
  } else {
    statusMsg.className = 'status wait';
    statusMsg.textContent = '';
    closedNote.style.display = 'block';
  }
}

function makeBtn(p, i, open) {
  const btn = document.createElement('button');
  btn.className = 'vbtn';
  btn.style.background = p.color;
  // Dark text for light colors, white for dark
  btn.style.color = isLight(p.color) ? '#000' : '#fff';
  btn.textContent = p.name;
  btn.disabled = !open;
  btn.addEventListener('click', () => castVote(i));
  return btn;
}

// ── Cast vote ─────────────────────────────────────────────────────────────────
function castVote(playerIndex) {
  if (!ws || ws.readyState !== WebSocket.OPEN || submitting) return;
  if (!state?.voting?.open) return;
  submitting = true;
  Array.from(voteGrid.children).forEach(b => { b.disabled = true; });
  statusMsg.textContent = 'Submitting…';
  ws.send(JSON.stringify({ type: 'VOTE', voterId: VOTER_ID, playerIndex }));
}

function handleResult(msg) {
  submitting = false;
  if (msg.success) {
    const player = state?.players[msg.playerIndex];
    const round  = state?.voting?.round;

    // Store voted round so we show thank-you even after reconnect
    votedRound = round;
    sessionStorage.setItem('gs_voted_round', round);

    document.getElementById('votedName').textContent = player?.name || '—';
    document.getElementById('votedName').style.color = player?.color || '#2ed573';

    voteMain.classList.add('gone');
    thankYou.classList.add('show');

  } else if (msg.message === 'already_voted') {
    // Edge case: server thinks we already voted (shouldn't normally happen)
    votedRound = state?.voting?.round || 1;
    sessionStorage.setItem('gs_voted_round', votedRound);
    voteMain.classList.add('gone');
    thankYou.classList.add('show');
    document.getElementById('votedName').textContent = '—';

  } else {
    statusMsg.className = 'status error';
    statusMsg.textContent = msg.message || 'Something went wrong. Try again.';
    Array.from(voteGrid.children).forEach(b => { b.disabled = !state?.voting?.open; });
  }
}

// ── Utilities ─────────────────────────────────────────────────────────────────
function isLight(hex) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return (r*299 + g*587 + b*114) / 1000 > 145;
}

connect();
</script>
</body>
</html>
